<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문장분석 트레이너 | 천문장 입문</title>
  <meta name="description" content="천문장 입문 전체 문장분석 인터랙티브 학습 - 중학교 영어">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── HEADER ── -->
<header id="app-header">
  <div class="header-logo">
    <span class="logo-icon">📐</span>
    <span>문장분석 트레이너</span>
    <span class="badge">천문장 입문</span>
  </div>

  <nav class="header-tabs">
    <button class="tab-btn active" data-tab="study" id="tabStudy">
      <span class="tab-icon">📖</span>
      <span class="tab-text">개념학습</span>
    </button>
    <button class="tab-btn" data-tab="practice" id="tabPractice">
      <span class="tab-icon">✏️</span>
      <span class="tab-text">분석연습</span>
    </button>
    <button class="tab-btn" data-tab="quiz" id="tabQuiz">
      <span class="tab-icon">🎯</span>
      <span class="tab-text">퀴즈</span>
    </button>
    <button class="tab-btn" data-tab="homework" id="tabHomework">
      <span class="tab-icon">📤</span>
      <span class="tab-text">숙제생성</span>
    </button>
  </nav>

  <div class="header-right">
    <div class="streak-badge" id="streakBadge">🔥 <span id="streakCount">0</span>일</div>
    <div class="xp-badge">⭐ <span id="xpCount">0</span> XP</div>
  </div>
</header>

<!-- ── TAB: 개념학습 ── -->
<div class="tab-panel active" id="panel-study">
  <div class="page-wrap">
    <div class="section-card">
      <div class="section-header">
        <div class="section-title">
          <span class="section-icon">🎨</span>
          <span>성분 색깔 기호표</span>
        </div>
      </div>
      <div class="section-body">
        <div class="legend-grid" id="legendGrid"></div>
      </div>
    </div>

    <h2 style="font-size:1rem;color:var(--text2);margin-bottom:14px;">▶ 학습할 Point를 선택하세요</h2>
    <div class="point-grid" id="studyPointGrid"></div>

    <div id="studyDetail" style="display:none;">
      <div class="section-card">
        <div class="section-header">
          <div class="section-title">
            <span class="section-icon">📌</span>
            <span id="studyPointTitle">Point</span>
          </div>
          <button class="btn btn-secondary btn-sm" id="studyBackBtn">← 목록으로</button>
        </div>
        <div class="section-body">
          <div class="formula-box">
            <div class="formula-text" id="studyFormula"></div>
            <div class="formula-note" id="studyNote"></div>
          </div>
          <div id="studyAntTable"></div>
          <h3 style="font-size:.9rem;font-weight:700;color:var(--text2);margin-bottom:12px;">📝 분석 예문</h3>
          <div id="studyExamples"></div>
        </div>
      </div>
      <div style="text-align:center;margin-top:8px;">
        <button class="btn btn-primary" id="goToPracticeBtn">이 Point 연습하기 →</button>
      </div>
    </div>
  </div>
</div>

<!-- ── TAB: 분석연습 ── -->
<div class="tab-panel" id="panel-practice">
  <div class="page-wrap">
    <div id="practicePointSelect">
      <h2 style="font-size:1rem;color:var(--text2);margin-bottom:14px;">▶ 연습할 Point를 선택하세요</h2>
      <div class="point-grid" id="practicePointGrid"></div>
    </div>

    <div id="practiceMain" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <button class="btn btn-secondary btn-sm" id="practiceBackBtn">← Point 선택</button>
        <span id="practicePointLabel" style="font-weight:700;color:var(--primary-dark);"></span>
      </div>

      <div class="practice-progress">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="practiceProgressBar" style="width:0%"></div></div>
        <div class="progress-text" id="practiceProgressText">0 / 0</div>
      </div>

      <div class="practice-sentence-card" id="practiceSentenceCard">
        <div class="example-num" id="practiceQNum"></div>
        <div class="tokens-interactive" id="practiceTokens"></div>

        <div class="label-panel" id="labelPanel">
          <div class="label-panel-title">선택된 단어: <span id="selectedTokenName">-</span> → 성분을 고르세요</div>
          <div class="label-buttons" id="labelButtons"></div>
        </div>

        <div class="practice-actions">
          <button class="btn btn-primary" id="checkAnswerBtn">✅ 정답 확인</button>
          <button class="btn btn-hint" id="hintBtn">💡 힌트</button>
          <button class="btn btn-secondary" id="retryPracticeBtn" style="display:none;">🔄 다시 풀기</button>
          <button class="btn btn-secondary" id="nextPracticeBtn" style="display:none;">다음 문장 →</button>
        </div>
        <div id="practiceFeedback" style="display:none;"></div>
        <div class="example-translation" id="practiceTranslation" style="display:none;"></div>
      </div>
    </div>

    <!-- 연습 결과 / 오답 풀기 -->
    <div id="practiceResult" style="display:none;">
      <div class="section-card">
        <div class="section-header">
          <div class="section-title"><span class="section-icon">📊</span><span>연습 결과</span></div>
        </div>
        <div class="section-body" style="text-align:center;">
          <div class="stars" id="practiceStars"></div>
          <div class="quiz-result-score" id="practiceResultScore"></div>
          <div class="quiz-result-msg" id="practiceResultMsg"></div>
          <div style="display:flex;gap:10px;justify-content:center;">
            <button class="btn btn-primary" id="retryWrongBtn" style="display:none;">❌ 오답만 다시 풀기</button>
            <button class="btn btn-secondary" id="retryAllBtn">🔄 전체 다시 풀기</button>
            <button class="btn btn-secondary" id="practiceToSelectBtn">← Point 선택</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── TAB: 퀴즈 ── -->
<div class="tab-panel" id="panel-quiz">
  <div class="page-wrap">
    <div id="quizSetup">
      <div class="section-card">
        <div class="section-header">
          <div class="section-title"><span class="section-icon">🎯</span><span>퀴즈 설정</span></div>
        </div>
        <div class="section-body">
          <h3 style="font-size:.95rem;color:var(--text2);margin-bottom:14px;">▶ 퀴즈 범위를 선택하세요 (유닛별 / 개별 포인트)</h3>
          <div id="quizUnitGrid"></div>
          <div style="margin-top:20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <button class="btn btn-primary" id="startQuizBtn">퀴즈 시작 🚀</button>
            <button class="btn btn-secondary btn-sm" id="quizSelectAllBtn">전체 선택</button>
            <button class="btn btn-secondary btn-sm" id="quizDeselectAllBtn">전체 해제</button>
          </div>
        </div>
      </div>
    </div>


    <div id="quizMain" style="display:none;">
      <div class="quiz-header">
        <button class="btn btn-secondary btn-sm" id="quizBackBtn">← 설정</button>
        <div class="quiz-score-display">🎯 <span id="quizScoreDisplay">0 / 0</span></div>
      </div>

      <div id="quizQuestionArea">
        <div class="quiz-question-card" id="quizCard">
          <div class="quiz-q-num" id="quizQNum"></div>
          <div class="quiz-sentence" id="quizSentence"></div>
          <div class="quiz-choices" id="quizChoices"></div>
          <div class="quiz-explanation" id="quizExplanation" style="display:none;"></div>
        </div>
        <div style="text-align:right;">
          <button class="btn btn-primary" id="nextQuizBtn" style="display:none;">다음 문제 →</button>
        </div>
      </div>

      <div id="quizResultArea" style="display:none;">
        <div class="quiz-result-screen">
          <div class="stars" id="quizStars"></div>
          <div class="quiz-result-score" id="quizResultScore"></div>
          <div class="quiz-result-msg" id="quizResultMsg"></div>
          <div style="display:flex;gap:10px;justify-content:center;">
            <button class="btn btn-primary" id="retryQuizBtn">다시 풀기 🔄</button>
            <button class="btn btn-secondary" id="quizToSetupBtn">설정으로</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── TAB: 숙제생성 ── -->
<div class="tab-panel" id="panel-homework">
  <div class="page-wrap">
    <div class="section-card">
      <div class="section-header">
        <div class="section-title"><span class="section-icon">📤</span><span>숙제 자동 생성</span></div>
      </div>
      <div class="section-body">
        <div class="hw-form">
          <div class="hw-group">
            <label>📚 학습 범위 선택</label>
            <div class="hw-checkboxes" id="hwPointChecks"></div>
          </div>
          <div class="hw-group">
            <label>📝 문제 유형</label>
            <div class="hw-checkboxes" id="hwTypeChecks">
              <label class="hw-check-item checked" data-val="choice">
                <input type="checkbox" checked> 🔤 관계사 선택형
              </label>
              <label class="hw-check-item checked" data-val="analysis">
                <input type="checkbox" checked> 🏷️ 문장성분 분석형
              </label>
              <label class="hw-check-item" data-val="translation">
                <input type="checkbox"> 🇰🇷 우리말 해석형
              </label>
            </div>
          </div>
          <div class="hw-group">
            <label>🔢 문제 수</label>
            <div class="hw-radios" id="hwCountRadios">
              <label class="hw-radio-item" data-val="5"><input type="radio" name="hwCount"> 5문제</label>
              <label class="hw-radio-item checked" data-val="10"><input type="radio" name="hwCount" checked> 10문제</label>
              <label class="hw-radio-item" data-val="15"><input type="radio" name="hwCount"> 15문제</label>
            </div>
          </div>
          <div class="hw-group">
            <label>👤 학생 정보 (선택사항)</label>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
              <input type="text" id="hwStudentName" placeholder="이름" style="padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-family:inherit;font-size:.9rem;width:120px;">
              <input type="text" id="hwClassName" placeholder="반" style="padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-family:inherit;font-size:.9rem;width:80px;">
              <input type="text" id="hwDate" placeholder="날짜" style="padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-family:inherit;font-size:.9rem;width:140px;">
            </div>
          </div>
          <div class="hw-group">
            <label>🖨️ 인쇄 범위</label>
            <div class="hw-radios" id="hwPrintMode">
              <label class="hw-radio-item checked" data-val="both"><input type="radio" name="hwPrint" checked> 문제+정답</label>
              <label class="hw-radio-item" data-val="questions"><input type="radio" name="hwPrint"> 문제만</label>
              <label class="hw-radio-item" data-val="answers"><input type="radio" name="hwPrint"> 정답만</label>
            </div>
          </div>
          <div class="hw-actions">
            <button class="btn btn-primary" id="generateHwBtn">📄 숙제 생성</button>
            <button class="btn btn-secondary" id="printHwBtn" style="display:none;">🖨️ 인쇄</button>
          </div>
        </div>
      </div>
    </div>

    <div id="hw-preview">
      <div id="hw-print-questions"></div>
      <div id="hw-print-answers"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="data/index.js"></script>
<script src="data/unit01.js"></script>
<script src="data/unit02.js"></script>
<script src="data/unit03.js"></script>
<script src="data/unit04.js"></script>
<script src="data/unit05.js"></script>
<script src="data/unit06.js"></script>
<script src="data/unit07.js"></script>
<script src="data/unit08.js"></script>
<script src="data/unit09.js"></script>
<script src="data/unit10.js"></script>
<script src="data/unit11.js"></script>
<script src="data/unit12.js"></script>
<script src="data/unit13.js"></script>
<script src="data/unit14.js"></script>
<script src="data/unit15.js"></script>

<script src="app.js"></script>
</body>
</html>
